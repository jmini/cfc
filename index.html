<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- Rendu "application" : lancement plein écran depuis l'écran d'accueil -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cdf Clécy">
  <meta name="theme-color" content="#2f5e26">
  <!-- Icônes d'application -->
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>Cdf Clécy</title>
  <style>
    :root {
      --border: #000;
      --green: #4e8a3f;
      --green-dark: #2f5e26;
      --gap: 4px;
    }

    * { box-sizing: border-box; }

    /* Autorise le défilement vertical mais désactive le zoom par pincement
       (Android/Chrome ignore user-scalable=no ; touch-action, lui, est respecté) */
    html {
      touch-action: pan-y;
    }

    body {
      margin: 0;
      padding: 12px;
      font-family: Arial, Helvetica, sans-serif;
      background: #fff;
      color: #000;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
    }

    /* ---------- Barre du haut : RAZ + TOTAL (toujours visible) ---------- */
    .topbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: stretch;
      /* Reste collée en haut de l'écran pendant le défilement */
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      padding: 8px 0;
      margin-bottom: 8px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, .15);
    }

    /* touch-action: manipulation -> empêche le zoom au double-tap sur mobile */
    .btn-raz,
    .cell button {
      touch-action: manipulation;
    }

    .btn-raz {
      font-size: 22px;
      font-weight: bold;
      color: #d00;
      background: #eee;
      border: 3px solid #7b2fb0;
      border-radius: 4px;
      padding: 6px 22px;
      cursor: pointer;
      letter-spacing: 1px;
    }
    .btn-raz:hover { background: #e0e0e0; }
    .btn-raz:active { background: #d0d0d0; }

    .total-label,
    .total-value {
      background: var(--green);
      color: #fff;
      font-weight: bold;
      display: flex;
      align-items: center;
      border-radius: 3px;
    }
    .total-label {
      font-size: 24px;
      padding: 0 16px;
      justify-content: flex-end;
    }
    .total-value {
      font-size: 30px;
      padding: 0 18px;
      justify-content: flex-end;
      min-width: 160px;
      background: var(--green-dark);
    }

    /* ---------- Sections ---------- */
    .board {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .section-header {
      background: #b8b8b8;
      border: 2px solid var(--border);
      text-align: center;
      font-weight: bold;
      font-size: 17px;
      padding: 6px 0;
      letter-spacing: 1px;
    }
    .header-boissons { grid-column: 1 / 3; }
    .header-restauration { grid-column: 3 / 4; }

    .column {
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    /* ---------- Cellule article ----------
       Placement explicite par grille : badge (col 1), quantité (col 2),
       bouton + (col 3, ligne 1) et bouton − (col 3, ligne 2). Ce placement
       est redéfini en flexbox sur mobile (voir media query en bas). */
    .cell {
      display: grid;
      grid-template-columns: 1fr 34px 26px;
      grid-template-rows: 1fr 1fr;
      border: 2px solid var(--border);
      min-height: 48px;
      background: #fff;
    }

    .badge {
      grid-column: 1;
      grid-row: 1 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: bold;
      font-size: 12px;
      line-height: 1.1;
      padding: 4px;
      border-right: 2px solid var(--border);
    }
    /* pastille ronde pour les boissons */
    .badge.circle span {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,.5);
      padding: 2px;
    }

    .qty {
      grid-column: 2;
      grid-row: 1 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      border-right: 4px solid var(--strip, #ccc);
    }

    .cell button {
      border: none;
      border-left: 1px solid var(--border);
      background: #f2f2f2;
      cursor: pointer;
      font-size: 11px;
      line-height: 1;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    .btn-plus  { grid-column: 3; grid-row: 1; border-bottom: 1px solid var(--border); }
    .btn-moins { grid-column: 3; grid-row: 2; }
    .cell button:hover { background: #ddd; }
    .cell button:active { background: #ccc; }

    /* emplacement vide (réservé) */
    .cell.empty .badge span {
      background: #bdbdbd !important;
      border-color: #999;
    }
    .cell.empty button { visibility: hidden; }
    .cell.empty .qty { color: #999; }

    /* ======================= MOBILE : une colonne ======================= */
    @media (max-width: 640px) {
      body { padding: 8px; }

      .topbar { grid-template-columns: auto 1fr auto; }
      .total-value { min-width: 0; font-size: 24px; }
      .total-label { font-size: 18px; padding: 0 8px; }
      .btn-raz { font-size: 18px; padding: 6px 14px; }

      /* Board sur une seule colonne, headers regroupés avec leurs articles */
      .board { display: flex; flex-direction: column; gap: 6px; }
      .header-boissons     { order: 1; }
      #col-1               { order: 2; }
      #col-2               { order: 3; }
      .header-restauration { order: 4; }
      #col-3               { order: 5; }

      /* Chaque article en pleine largeur : − à gauche, + à droite */
      .cell {
        display: flex;
        align-items: stretch;
        min-height: 60px;
      }
      .cell .btn-moins { order: 1; }
      .cell .badge     { order: 2; flex: 1; border-left: 2px solid var(--border); }
      .cell .qty       { order: 3; min-width: 56px; border-right: none; border-left: 4px solid var(--strip, #ccc); }
      .cell .btn-plus  { order: 4; }

      .cell button {
        width: 64px;
        min-width: 64px;
        font-size: 26px;
        font-weight: bold;
        border: none;
        border-bottom: none;
      }
      .cell .btn-plus  { border-left: 1px solid var(--border); }
      .cell .btn-moins { border-right: 1px solid var(--border); }

      /* Libellé sur une seule ligne, police plus grande, débordement autorisé */
      .cell .badge {
        font-size: 17px;
        overflow: visible;
      }
      .cell .badge span { white-space: nowrap; }
      .cell .badge.circle span {
        width: 46px;
        height: 46px;
        overflow: visible;   /* le texte peut dépasser du cercle de fond */
      }
    }

    /* ======================= MODALE TICKET DE CAISSE ======================= */
    .total-label, .total-value { cursor: pointer; }
    .total-label:hover, .total-value:hover { filter: brightness(1.2); }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .55);
      z-index: 100;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 12px;
      overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }

    .ticket {
      position: relative;
      background: #fff;
      width: 100%;
      max-width: 400px;
      border-radius: 10px;
      padding: 20px 18px 18px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, .35);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }
    .ticket-close {
      position: absolute;
      top: 8px; right: 8px;
      width: 32px; height: 32px;
      border: none;
      background: transparent;
      font-size: 20px;
      cursor: pointer;
      color: #666;
      border-radius: 4px;
      touch-action: manipulation;
    }
    .ticket-close:hover { background: #eee; }

    .ticket-title {
      text-align: center;
      font-size: 18px;
      margin: 0 0 2px;
      letter-spacing: 3px;
    }
    .ticket-soustitre {
      text-align: center;
      color: #888;
      font-size: 12px;
      margin: 0 0 14px;
      padding-bottom: 12px;
      border-bottom: 2px dashed #bbb;
    }

    .ticket-lignes { display: flex; flex-direction: column; gap: 10px; }
    .recu-ligne { display: flex; align-items: center; gap: 10px; }
    .recu-qte { font-weight: bold; font-size: 15px; min-width: 34px; }
    .recu-jeton {
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      border: 2px solid rgba(0, 0, 0, .5);
    }
    .recu-jeton.j-cercle { border-radius: 50%; }
    .recu-jeton.j-rect { border-radius: 3px; }
    .recu-nom { flex: 1; line-height: 1.2; font-weight: bold; }
    .recu-nom small { display: block; color: #999; font-size: 11px; font-weight: normal; }
    .recu-prix { font-weight: bold; white-space: nowrap; }

    .ticket-vide { text-align: center; color: #999; padding: 24px 0; }

    .ticket-total {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 2px dashed #bbb;
      font-size: 22px;
      font-weight: bold;
    }
    .ticket-total span:last-child { color: var(--green-dark); }

    .btn-suivant {
      width: 100%;
      margin-top: 40px;
      padding: 14px;
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      background: var(--green-dark);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 1px;
      touch-action: manipulation;
    }
    .btn-suivant:hover { background: #24491d; }
    .btn-suivant:active { background: #1c3a17; }

    /* ---------- Lien d'installation + feuille QR (ancrée en bas) ---------- */
    .app-footer { text-align: center; margin: 18px 0 6px; }
    .app-version {
      display: block;
      font-size: 13px;
      font-weight: bold;
      color: #555;
      margin-bottom: 6px;
    }
    .app-footer a {
      color: var(--green-dark);
      font-size: 14px;
      font-weight: bold;
      text-decoration: none;
      border-bottom: 1px dotted var(--green-dark);
      cursor: pointer;
    }
    .app-footer a:hover { filter: brightness(1.3); }

    .modal-overlay.sheet { align-items: flex-end; padding: 0; }
    @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-overlay.sheet.open .qr-sheet { animation: sheetUp .25s ease; }

    .qr-sheet {
      position: relative;
      background: #fff;
      width: 100%;
      max-width: 480px;
      border-radius: 16px 16px 0 0;
      padding: 22px 20px 28px;
      box-shadow: 0 -6px 30px rgba(0, 0, 0, .3);
      text-align: center;
    }
    .qr-title { font-size: 18px; margin: 0 0 14px; }
    .qr-code {
      width: 220px;
      max-width: 70vw;
      margin: 0 auto 12px;
      padding: 10px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    .qr-code svg { display: block; width: 100%; height: auto; }
    .qr-url a {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 14px;
      font-weight: bold;
      color: var(--green-dark);
      margin: 0 0 4px;
      word-break: break-all;
    }
    .qr-help { font-size: 13px; color: #666; margin: 0; }
  </style>
</head>
<body>

      </div>
      <p class="qr-url"><a href="https://jmini.github.io/cfc">jmini.github.io/cfc</a></p>
      <p class="qr-help">Scannez ce code, puis « Ajouter à l'écran d'accueil ».</p>

  <script>
  /* =======================================================================
     CONFIGURATION
     -----------------------------------------------------------------------
     Les prix, les articles et le titre de version sont définis dans le
     fichier "config.json" placé à côté de index.html. Il est chargé au
     démarrage par la fonction demarrer() (tout en bas de ce script).
     ======================================================================= */
  let ARTICLES = [];   // rempli depuis config.json
  let VERSION = "";    // titre de version, rempli depuis config.json
  let quantities = []; // quantité vendue par article (même index qu'ARTICLES)

  const totalEl = document.getElementById("total");

  function formatEuros(value) {
    return value.toFixed(2).replace(".", ",") + " €";
  }

  function updateTotal() {
    let total = 0;
    ARTICLES.forEach((a, i) => { total += a.prix * quantities[i]; });
    totalEl.textContent = formatEuros(total);
  }

  // Vrai si la couleur est claire (blanc, gris clair…) -> nécessite un contour
  function estCouleurClaire(hex) {
    const m = String(hex).replace("#", "");
    const h = m.length === 3 ? m.split("").map((c) => c + c).join("") : m;
    const r = parseInt(h.slice(0, 2), 16);
    const g = parseInt(h.slice(2, 4), 16);
    const b = parseInt(h.slice(4, 6), 16);
    return (0.299 * r + 0.587 * g + 0.114 * b) > 150;
  }

  // Ajoute une action au bouton, tolérante au scroll tactile :
  //  - rien ne se déclenche au simple contact du doigt ;
  //  - un TAP (contact bref, sans déplacement) => 1 action au relâchement ;
  //  - un APPUI MAINTENU immobile => répétition automatique ;
  //  - dès que le doigt se déplace (scroll) => tout est annulé, aucune action.
  function attachRepeat(btn, action) {
    const DELAI_INITIAL = 400;   // ms avant le début de la répétition
    const INTERVALLE = 90;       // ms entre deux répétitions
    const SEUIL_MOUVEMENT = 10;  // px de déplacement -> considéré comme un scroll
    let timeout = null, interval = null;
    let startX = 0, startY = 0;
    let actif = false, deplace = false, repete = false;

    const stopTimers = () => {
      clearTimeout(timeout);
      clearInterval(interval);
      timeout = interval = null;
    };
    const annuler = () => { stopTimers(); actif = false; };

    btn.addEventListener("pointerdown", (e) => {
      if (e.pointerType === "mouse" && e.button !== 0) return; // clic gauche uniquement
      actif = true; deplace = false; repete = false;
      startX = e.clientX; startY = e.clientY;
      // La répétition ne démarre que si le doigt reste immobile
      timeout = setTimeout(() => {
        repete = true;
        action();                                   // 1re action de la répétition
        interval = setInterval(action, INTERVALLE);
      }, DELAI_INITIAL);
    });

    btn.addEventListener("pointermove", (e) => {
      if (!actif) return;
      if (Math.abs(e.clientX - startX) > SEUIL_MOUVEMENT ||
          Math.abs(e.clientY - startY) > SEUIL_MOUVEMENT) {
        deplace = true;   // c'est un scroll
        annuler();
      }
    });

    btn.addEventListener("pointerup", () => {
      if (!actif) return;
      stopTimers();
      // Tap simple : pas de déplacement et la répétition n'a pas démarré
      if (!deplace && !repete) action();
      actif = false;
    });

    // Le navigateur reprend la main pour scroller, ou le doigt sort : on annule
    btn.addEventListener("pointercancel", annuler);
    btn.addEventListener("pointerleave", annuler);

    // Accessibilité clavier (Entrée / Espace, avec répétition native au maintien)
    btn.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); action(); }
    });
  }

  function buildCell(article, index) {
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.style.setProperty("--strip", article.couleurFond);

    // Pastille / libellé
    const badge = document.createElement("div");
    badge.className = "badge " + (article.forme === "cercle" ? "circle" : "rect");
    const inner = document.createElement("span");
    inner.textContent = article.libelle;
    inner.style.background = article.couleurFond;
    inner.style.color = article.couleurTexte;
    // Motif optionnel : hachures blanches à 45° par-dessus le fond
    if (article.motif === "hachures") {
      inner.style.backgroundImage =
        "repeating-linear-gradient(-45deg, #fff 0, #fff 3px, transparent 3px, transparent 9px)";
    }
    // Contour noir net sur les textes clairs pour garantir la lisibilité,
    // y compris quand le texte déborde sur le fond blanc de la cellule.
    if (estCouleurClaire(article.couleurTexte)) {
      inner.style.textShadow =
        "-1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 0 3px #000";
    }
    if (article.forme === "rectangle") {
      inner.style.display = "block";
      inner.style.width = "100%";
      inner.style.padding = "10px 4px";
      inner.style.border = "2px solid rgba(0,0,0,.4)";
    }
    badge.appendChild(inner);

    // Quantité
    const qty = document.createElement("div");
    qty.className = "qty";
    qty.textContent = "0";

    // Boutons + / − (enfants directs de la cellule ; placés par la grille
    // sur desktop, et à gauche/droite via flexbox sur mobile)
    const up = document.createElement("button");
    up.type = "button";
    up.className = "btn-plus";
    up.textContent = "+";
    up.setAttribute("aria-label", "Ajouter " + article.libelle);
    const down = document.createElement("button");
    down.type = "button";
    down.className = "btn-moins";
    down.textContent = "−";
    down.setAttribute("aria-label", "Retirer " + article.libelle);

    // Respecte la limite de quantité définie dans la SECTION PRIX DE VENTE
    attachRepeat(up, () => {
      if (quantities[index] >= article.limite) return;
      quantities[index]++;
      qty.textContent = quantities[index];
      updateTotal();
    });
    attachRepeat(down, () => {
      if (quantities[index] > 0) {
        quantities[index]--;
        qty.textContent = quantities[index];
        updateTotal();
      }
    });

    cell.appendChild(badge);
    cell.appendChild(qty);
    cell.appendChild(up);
    cell.appendChild(down);

    // Mémoriser l'élément quantité pour le RAZ
    cell._qtyEl = qty;
    return cell;
  }

  // Rendu des colonnes
  const columns = {
    1: document.getElementById("col-1"),
    2: document.getElementById("col-2"),
    3: document.getElementById("col-3"),
  };
  const cells = [];
  function construireArticles() {
    quantities = ARTICLES.map(() => 0);
    ARTICLES.forEach((article, index) => {
      if (article.inactif) return; // les articles inactifs ne sont pas affichés
      const cell = buildCell(article, index);
      columns[article.colonne].appendChild(cell);
      cells[index] = cell;
    });
  }

  // RAZ : remise à zéro de toutes les quantités et du total
  function resetAll() {
    for (let i = 0; i < quantities.length; i++) {
      quantities[i] = 0;
      if (cells[i]) cells[i]._qtyEl.textContent = "0";
    }
    updateTotal();
  }
  document.getElementById("raz").addEventListener("click", resetAll);

  /* =======================================================================
     MODALE TICKET DE CAISSE
     ======================================================================= */
  const modal = document.getElementById("modal");
  const ticketLignes = document.getElementById("ticket-lignes");
  const ticketTotalVal = document.getElementById("ticket-total-val");

  // Petit jeton (forme + couleur + éventuel motif) pour le ticket
  function createJeton(article) {
    const j = document.createElement("span");
    j.className = "recu-jeton " + (article.forme === "cercle" ? "j-cercle" : "j-rect");
    j.style.background = article.couleurFond;
    if (article.motif === "hachures") {
      j.style.backgroundImage =
        "repeating-linear-gradient(-45deg, #fff 0, #fff 3px, transparent 3px, transparent 9px)";
    }
    return j;
  }

  // Construit le contenu du ticket à partir des quantités choisies
  function renderTicket() {
    ticketLignes.innerHTML = "";
    let total = 0;
    let nbLignes = 0;

    ARTICLES.forEach((article, i) => {
      const q = quantities[i];
      if (q <= 0) return;
      nbLignes++;
      const sousTotal = article.prix * q;
      total += sousTotal;

      const ligne = document.createElement("div");
      ligne.className = "recu-ligne";

      const qte = document.createElement("span");
      qte.className = "recu-qte";
      qte.textContent = q + "×";

      const nom = document.createElement("span");
      nom.className = "recu-nom";
      nom.appendChild(document.createTextNode(article.libelle || "—"));
      const pu = document.createElement("small");
      pu.textContent = formatEuros(article.prix) + " / u";
      nom.appendChild(pu);

      const prix = document.createElement("span");
      prix.className = "recu-prix";
      prix.textContent = formatEuros(sousTotal);

      ligne.append(qte, createJeton(article), nom, prix);
      ticketLignes.appendChild(ligne);
    });

    if (nbLignes === 0) {
      const vide = document.createElement("p");
      vide.className = "ticket-vide";
      vide.textContent = "Aucun article sélectionné.";
      ticketLignes.appendChild(vide);
    }
    ticketTotalVal.textContent = formatEuros(total);
  }

  function openTicket() { renderTicket(); modal.classList.add("open"); }
  function closeTicket() { modal.classList.remove("open"); }

  // Ouverture au clic (et au clavier) sur le libellé « TOTAL : » et le montant
  document.querySelectorAll(".total-label, .total-value").forEach((el) => {
    el.setAttribute("role", "button");
    el.setAttribute("tabindex", "0");
    el.setAttribute("title", "Voir le détail de la vente");
    el.addEventListener("click", openTicket);
    el.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openTicket(); }
    });
  });

  // Fermeture : bouton ✕, clic sur le fond, touche Échap
  document.getElementById("ticket-close").addEventListener("click", closeTicket);
  modal.addEventListener("click", (e) => { if (e.target === modal) closeTicket(); });
  document.addEventListener("keydown", (e) => {
    if (e.key !== "Escape") return;
    if (modal.classList.contains("open")) closeTicket();
    if (document.getElementById("qr-modal").classList.contains("open")) {
      document.getElementById("qr-modal").classList.remove("open");
    }
  });

  // Bouton RAZ du ticket -> remet à zéro et ferme (client suivant)
  document.getElementById("btn-suivant").addEventListener("click", () => {
    resetAll();
    closeTicket();
  });

  /* =======================================================================
     FEUILLE QR CODE (lien "Installer l'application" en bas de l'écran)
     ======================================================================= */
  const qrModal = document.getElementById("qr-modal");
  function openQR() { qrModal.classList.add("open"); }
  function closeQR() { qrModal.classList.remove("open"); }
  document.getElementById("lien-qr").addEventListener("click", (e) => { e.preventDefault(); openQR(); });
  document.getElementById("qr-close").addEventListener("click", closeQR);
  qrModal.addEventListener("click", (e) => { if (e.target === qrModal) closeQR(); });

  /* =======================================================================
     PIÈGE DE NAVIGATION "RETOUR" (aspect application)
     -----------------------------------------------------------------------
     Le geste / bouton "Précédent" ne quitte plus la page : s'il y a une
     modale ouverte, il la ferme ; sinon l'état est simplement ré-empilé.
     ======================================================================= */
  history.pushState(null, "", location.href);
  window.addEventListener("popstate", () => {
    if (modal.classList.contains("open")) closeTicket();
    if (qrModal.classList.contains("open")) closeQR();
    history.pushState(null, "", location.href);
  });

  /* =======================================================================
     DÉMARRAGE : chargement de config.json puis construction de l'écran
     ======================================================================= */
  function demarrer(config) {
    ARTICLES = Array.isArray(config.articles) ? config.articles : [];
    VERSION = config.version || "";
    construireArticles();
    updateTotal();
    document.getElementById("app-version").textContent = VERSION;
  }

  fetch("config.json", { cache: "no-cache" })
    .then((r) => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
    .then(demarrer)
    .catch((err) => {
      totalEl.textContent = "Erreur";
      const msg = document.createElement("p");
      msg.style.cssText = "color:#c00;font-weight:bold;text-align:center;padding:12px";
      msg.textContent = "Impossible de charger config.json : " + err.message
        + " — la page doit être servie via http(s) (pas ouverte en file://).";
      document.querySelector(".board").appendChild(msg);
    });

  /* =======================================================================
     SERVICE WORKER — mises à jour automatiques (au prochain lancement) + hors-ligne
     ======================================================================= */
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
  </script>
</body>
</html>
