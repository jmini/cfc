<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- Rendu "application" : lancement plein écran depuis l'écran d'accueil -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cdf Clécy">
  <meta name="theme-color" content="#2f5e26">
  <!-- Icônes d'application -->
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>Cdf Clécy</title>
  <style>
    :root {
      --border: #000;
      --green: #4e8a3f;
      --green-dark: #2f5e26;
      --gap: 4px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 12px;
      font-family: Arial, Helvetica, sans-serif;
      background: #fff;
      color: #000;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
    }

    /* ---------- Barre du haut : RAZ + TOTAL (toujours visible) ---------- */
    .topbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: stretch;
      /* Reste collée en haut de l'écran pendant le défilement */
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      padding: 8px 0;
      margin-bottom: 8px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, .15);
    }

    /* touch-action: manipulation -> empêche le zoom au double-tap sur mobile */
    .btn-raz,
    .cell button {
      touch-action: manipulation;
    }

    .btn-raz {
      font-size: 22px;
      font-weight: bold;
      color: #d00;
      background: #eee;
      border: 3px solid #7b2fb0;
      border-radius: 4px;
      padding: 6px 22px;
      cursor: pointer;
      letter-spacing: 1px;
    }
    .btn-raz:hover { background: #e0e0e0; }
    .btn-raz:active { background: #d0d0d0; }

    .total-label,
    .total-value {
      background: var(--green);
      color: #fff;
      font-weight: bold;
      display: flex;
      align-items: center;
      border-radius: 3px;
    }
    .total-label {
      font-size: 24px;
      padding: 0 16px;
      justify-content: flex-end;
    }
    .total-value {
      font-size: 30px;
      padding: 0 18px;
      justify-content: flex-end;
      min-width: 160px;
      background: var(--green-dark);
    }

    /* ---------- Sections ---------- */
    .board {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .section-header {
      background: #b8b8b8;
      border: 2px solid var(--border);
      text-align: center;
      font-weight: bold;
      font-size: 17px;
      padding: 6px 0;
      letter-spacing: 1px;
    }
    .header-boissons { grid-column: 1 / 3; }
    .header-restauration { grid-column: 3 / 4; }

    .column {
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    /* ---------- Cellule article ----------
       Placement explicite par grille : badge (col 1), quantité (col 2),
       bouton + (col 3, ligne 1) et bouton − (col 3, ligne 2). Ce placement
       est redéfini en flexbox sur mobile (voir media query en bas). */
    .cell {
      display: grid;
      grid-template-columns: 1fr 34px 26px;
      grid-template-rows: 1fr 1fr;
      border: 2px solid var(--border);
      min-height: 48px;
      background: #fff;
    }

    .badge {
      grid-column: 1;
      grid-row: 1 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: bold;
      font-size: 12px;
      line-height: 1.1;
      padding: 4px;
      border-right: 2px solid var(--border);
    }
    /* pastille ronde pour les boissons */
    .badge.circle span {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,.5);
      padding: 2px;
    }

    .qty {
      grid-column: 2;
      grid-row: 1 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      border-right: 4px solid var(--strip, #ccc);
    }

    .cell button {
      border: none;
      border-left: 1px solid var(--border);
      background: #f2f2f2;
      cursor: pointer;
      font-size: 11px;
      line-height: 1;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    .btn-plus  { grid-column: 3; grid-row: 1; border-bottom: 1px solid var(--border); }
    .btn-moins { grid-column: 3; grid-row: 2; }
    .cell button:hover { background: #ddd; }
    .cell button:active { background: #ccc; }

    /* emplacement vide (réservé) */
    .cell.empty .badge span {
      background: #bdbdbd !important;
      border-color: #999;
    }
    .cell.empty button { visibility: hidden; }
    .cell.empty .qty { color: #999; }

    /* ======================= MOBILE : une colonne ======================= */
    @media (max-width: 640px) {
      body { padding: 8px; }

      .topbar { grid-template-columns: auto 1fr auto; }
      .total-value { min-width: 0; font-size: 24px; }
      .total-label { font-size: 18px; padding: 0 8px; }
      .btn-raz { font-size: 18px; padding: 6px 14px; }

      /* Board sur une seule colonne, headers regroupés avec leurs articles */
      .board { display: flex; flex-direction: column; gap: 6px; }
      .header-boissons     { order: 1; }
      #col-1               { order: 2; }
      #col-2               { order: 3; }
      .header-restauration { order: 4; }
      #col-3               { order: 5; }

      /* Chaque article en pleine largeur : − à gauche, + à droite */
      .cell {
        display: flex;
        align-items: stretch;
        min-height: 60px;
      }
      .cell .btn-moins { order: 1; }
      .cell .badge     { order: 2; flex: 1; border-left: 2px solid var(--border); }
      .cell .qty       { order: 3; min-width: 56px; border-right: none; border-left: 4px solid var(--strip, #ccc); }
      .cell .btn-plus  { order: 4; }

      .cell button {
        width: 64px;
        min-width: 64px;
        font-size: 26px;
        font-weight: bold;
        border: none;
        border-bottom: none;
      }
      .cell .btn-plus  { border-left: 1px solid var(--border); }
      .cell .btn-moins { border-right: 1px solid var(--border); }

      /* Libellé sur une seule ligne, police plus grande, débordement autorisé */
      .cell .badge {
        font-size: 17px;
        overflow: visible;
      }
      .cell .badge span { white-space: nowrap; }
      .cell .badge.circle span {
        width: 46px;
        height: 46px;
        overflow: visible;   /* le texte peut dépasser du cercle de fond */
      }
    }

    /* ======================= MODALE TICKET DE CAISSE ======================= */
    .total-label, .total-value { cursor: pointer; }
    .total-label:hover, .total-value:hover { filter: brightness(1.2); }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .55);
      z-index: 100;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 12px;
      overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }

    .ticket {
      position: relative;
      background: #fff;
      width: 100%;
      max-width: 400px;
      border-radius: 10px;
      padding: 20px 18px 18px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, .35);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }
    .ticket-close {
      position: absolute;
      top: 8px; right: 8px;
      width: 32px; height: 32px;
      border: none;
      background: transparent;
      font-size: 20px;
      cursor: pointer;
      color: #666;
      border-radius: 4px;
      touch-action: manipulation;
    }
    .ticket-close:hover { background: #eee; }

    .ticket-title {
      text-align: center;
      font-size: 18px;
      margin: 0 0 2px;
      letter-spacing: 3px;
    }
    .ticket-soustitre {
      text-align: center;
      color: #888;
      font-size: 12px;
      margin: 0 0 14px;
      padding-bottom: 12px;
      border-bottom: 2px dashed #bbb;
    }

    .ticket-lignes { display: flex; flex-direction: column; gap: 10px; }
    .recu-ligne { display: flex; align-items: center; gap: 10px; }
    .recu-qte { font-weight: bold; font-size: 15px; min-width: 34px; }
    .recu-jeton {
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      border: 2px solid rgba(0, 0, 0, .5);
    }
    .recu-jeton.j-cercle { border-radius: 50%; }
    .recu-jeton.j-rect { border-radius: 3px; }
    .recu-nom { flex: 1; line-height: 1.2; font-weight: bold; }
    .recu-nom small { display: block; color: #999; font-size: 11px; font-weight: normal; }
    .recu-prix { font-weight: bold; white-space: nowrap; }

    .ticket-vide { text-align: center; color: #999; padding: 24px 0; }

    .ticket-total {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 2px dashed #bbb;
      font-size: 22px;
      font-weight: bold;
    }
    .ticket-total span:last-child { color: var(--green-dark); }

    .btn-suivant {
      width: 100%;
      margin-top: 40px;
      padding: 14px;
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      background: var(--green-dark);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 1px;
      touch-action: manipulation;
    }
    .btn-suivant:hover { background: #24491d; }
    .btn-suivant:active { background: #1c3a17; }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <button class="btn-raz" id="raz">RAZ</button>
      <div class="total-label">TOTAL :</div>
      <div class="total-value" id="total">0,00 €</div>
    </div>

    <div class="board">
      <div class="section-header header-boissons">BOISSONS</div>
      <div class="section-header header-restauration">RESTAURATION</div>

      <div class="column" id="col-1"></div>
      <div class="column" id="col-2"></div>
      <div class="column" id="col-3"></div>
    </div>
  </div>

  <!-- Modale « ticket de caisse » (ouverte au clic sur le total) -->
  <div class="modal-overlay" id="modal">
    <div class="ticket" role="dialog" aria-modal="true" aria-label="Récapitulatif de la vente">
      <button class="ticket-close" id="ticket-close" aria-label="Fermer">✕</button>
      <h2 class="ticket-title">TICKET</h2>
      <p class="ticket-soustitre">Détail de la vente</p>
      <div class="ticket-lignes" id="ticket-lignes"></div>
      <div class="ticket-total"><span>TOTAL</span><span id="ticket-total-val">0,00 €</span></div>
      <button class="btn-suivant" id="btn-suivant">RAZ — Client suivant</button>
    </div>
  </div>

  <script>
  /* =======================================================================
     SECTION PRIX DE VENTE
     -----------------------------------------------------------------------
     Cette section regroupe le prix de vente (en euros) de chacun des
     articles de la vente. C'est le seul endroit à modifier pour ajuster
     les tarifs. Les articles "inactif: true" ne sont pas affichés.

       colonne      : colonne d'affichage (1 & 2 = BOISSONS, 3 = RESTAURATION)
       libelle      : texte affiché sur la pastille
       prix         : prix de vente unitaire en euros
       limite       : quantité maximale vendable pour cet article (stock max)
       couleurFond  : couleur de fond de la pastille
       couleurTexte : couleur du texte de la pastille
       forme        : "cercle" (boisson) ou "rectangle" (restauration)
       motif        : (optionnel) "hachures" -> hachures blanches à 45° sur le fond
       inactif      : true pour masquer l'article (non affiché, non vendable)
     ======================================================================= */
  const ARTICLES = [
    // --- Colonne 1 (BOISSONS) ---
    { colonne: 1, libelle: "BIÈRE",            prix: 3.00, limite: 30, couleurFond: "#f5e000", couleurTexte: "#000", forme: "cercle" },
    { colonne: 1, libelle: "CIDRE",            prix: 3.50, limite: 30, couleurFond: "#f08a24", couleurTexte: "#000", forme: "cercle", motif: "hachures" },
    { colonne: 1, libelle: "JUS de POMME",     prix: 2.50, limite: 30, couleurFond: "#f08a24", couleurTexte: "#000", forme: "cercle" },
    { colonne: 1, libelle: "SOFT",             prix: 2.00, limite: 30, couleurFond: "#ffffff", couleurTexte: "#000", forme: "cercle" },
    { colonne: 1, libelle: "CAFÉ",             prix: 1.00, limite: 30, couleurFond: "#000000", couleurTexte: "#FFF", forme: "cercle" },
    
    // --- Colonne 2 (BOISSONS) ---
    { colonne: 2, libelle: "EAU",              prix: 1.00, limite: 30, couleurFond: "#2e6db4", couleurTexte: "#cccccc", forme: "cercle" },
    { colonne: 2, libelle: "Bouteille ROUGE",  prix: 9.00, limite: 20, couleurFond: "#c00000", couleurTexte: "#cccccc", forme: "cercle" },
    { colonne: 2, libelle: "Bouteille ROSÉ",   prix: 9.00, limite: 20, couleurFond: "#e0218a", couleurTexte: "#cccccc", forme: "cercle" },
    { colonne: 2, libelle: "VERRE VIN ou KIR", prix: 2.00, limite: 30, couleurFond: "#7cb342", couleurTexte: "#000", forme: "cercle" },
    { colonne: 2, libelle: "",                 prix: 0.00, limite: 0,  couleurFond: "#bdbdbd", couleurTexte: "#000", forme: "cercle", inactif: true },
    { colonne: 2, libelle: "GOBELET",          prix: 1.00, limite: 50, couleurFond: "#e3e3f5", couleurTexte: "#5a2fa0", forme: "cercle" },

    // --- Colonne 3 (RESTAURATION) ---
    { colonne: 3, libelle: "PLATEAU REPAS",    prix: 20.00, limite: 20, couleurFond: "#000000", couleurTexte: "#FFF", forme: "rectangle" },
    { colonne: 3, libelle: "SANDWICH",         prix: 4.00,  limite: 30, couleurFond: "#e00000", couleurTexte: "#FFF", forme: "rectangle" },
    { colonne: 3, libelle: "FRITES",           prix: 2.50,  limite: 30, couleurFond: "#f5e000", couleurTexte: "#000", forme: "rectangle" },
    { colonne: 3, libelle: "CRÊPE",            prix: 1.50,  limite: 30, couleurFond: "#f08a24", couleurTexte: "#000", forme: "rectangle" },
    { colonne: 3, libelle: "",                 prix: 0.00,  limite: 0,  couleurFond: "#bdbdbd", couleurTexte: "#000", forme: "rectangle", inactif: true },
  ];
  /* ===================== FIN SECTION PRIX DE VENTE ===================== */

  // Quantité vendue pour chaque article (même index que ARTICLES)
  const quantities = ARTICLES.map(() => 0);

  const totalEl = document.getElementById("total");

  function formatEuros(value) {
    return value.toFixed(2).replace(".", ",") + " €";
  }

  function updateTotal() {
    let total = 0;
    ARTICLES.forEach((a, i) => { total += a.prix * quantities[i]; });
    totalEl.textContent = formatEuros(total);
  }

  // Vrai si la couleur est claire (blanc, gris clair…) -> nécessite un contour
  function estCouleurClaire(hex) {
    const m = String(hex).replace("#", "");
    const h = m.length === 3 ? m.split("").map((c) => c + c).join("") : m;
    const r = parseInt(h.slice(0, 2), 16);
    const g = parseInt(h.slice(2, 4), 16);
    const b = parseInt(h.slice(4, 6), 16);
    return (0.299 * r + 0.587 * g + 0.114 * b) > 150;
  }

  // Ajoute une action répétée en pression longue (souris + tactile) :
  // 1 action au premier appui, puis répétition tant que le bouton reste enfoncé.
  function attachRepeat(btn, action) {
    const DELAI_INITIAL = 400; // ms avant le début de la répétition
    const INTERVALLE = 90;     // ms entre deux répétitions
    let timeout = null;
    let interval = null;

    const stop = () => {
      clearTimeout(timeout);
      clearInterval(interval);
      timeout = interval = null;
    };
    const start = (e) => {
      if (e.pointerType === "mouse" && e.button !== 0) return; // clic gauche only
      e.preventDefault();
      action();
      timeout = setTimeout(() => { interval = setInterval(action, INTERVALLE); }, DELAI_INITIAL);
    };

    btn.addEventListener("pointerdown", start);
    btn.addEventListener("pointerup", stop);
    btn.addEventListener("pointerleave", stop);
    btn.addEventListener("pointercancel", stop);
    // Accessibilité clavier (Entrée / Espace, avec répétition native au maintien)
    btn.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); action(); }
    });
  }

  function buildCell(article, index) {
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.style.setProperty("--strip", article.couleurFond);

    // Pastille / libellé
    const badge = document.createElement("div");
    badge.className = "badge " + (article.forme === "cercle" ? "circle" : "rect");
    const inner = document.createElement("span");
    inner.textContent = article.libelle;
    inner.style.background = article.couleurFond;
    inner.style.color = article.couleurTexte;
    // Motif optionnel : hachures blanches à 45° par-dessus le fond
    if (article.motif === "hachures") {
      inner.style.backgroundImage =
        "repeating-linear-gradient(-45deg, #fff 0, #fff 3px, transparent 3px, transparent 9px)";
    }
    // Contour noir net sur les textes clairs pour garantir la lisibilité,
    // y compris quand le texte déborde sur le fond blanc de la cellule.
    if (estCouleurClaire(article.couleurTexte)) {
      inner.style.textShadow =
        "-1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 0 3px #000";
    }
    if (article.forme === "rectangle") {
      inner.style.display = "block";
      inner.style.width = "100%";
      inner.style.padding = "10px 4px";
      inner.style.border = "2px solid rgba(0,0,0,.4)";
    }
    badge.appendChild(inner);

    // Quantité
    const qty = document.createElement("div");
    qty.className = "qty";
    qty.textContent = "0";

    // Boutons + / − (enfants directs de la cellule ; placés par la grille
    // sur desktop, et à gauche/droite via flexbox sur mobile)
    const up = document.createElement("button");
    up.type = "button";
    up.className = "btn-plus";
    up.textContent = "+";
    up.setAttribute("aria-label", "Ajouter " + article.libelle);
    const down = document.createElement("button");
    down.type = "button";
    down.className = "btn-moins";
    down.textContent = "−";
    down.setAttribute("aria-label", "Retirer " + article.libelle);

    // Respecte la limite de quantité définie dans la SECTION PRIX DE VENTE
    attachRepeat(up, () => {
      if (quantities[index] >= article.limite) return;
      quantities[index]++;
      qty.textContent = quantities[index];
      updateTotal();
    });
    attachRepeat(down, () => {
      if (quantities[index] > 0) {
        quantities[index]--;
        qty.textContent = quantities[index];
        updateTotal();
      }
    });

    cell.appendChild(badge);
    cell.appendChild(qty);
    cell.appendChild(up);
    cell.appendChild(down);

    // Mémoriser l'élément quantité pour le RAZ
    cell._qtyEl = qty;
    return cell;
  }

  // Rendu des colonnes
  const columns = {
    1: document.getElementById("col-1"),
    2: document.getElementById("col-2"),
    3: document.getElementById("col-3"),
  };
  const cells = [];
  ARTICLES.forEach((article, index) => {
    if (article.inactif) return; // les articles inactifs ne sont pas affichés
    const cell = buildCell(article, index);
    columns[article.colonne].appendChild(cell);
    cells[index] = cell;
  });

  // RAZ : remise à zéro de toutes les quantités et du total
  function resetAll() {
    for (let i = 0; i < quantities.length; i++) {
      quantities[i] = 0;
      if (cells[i]) cells[i]._qtyEl.textContent = "0";
    }
    updateTotal();
  }
  document.getElementById("raz").addEventListener("click", resetAll);

  /* =======================================================================
     MODALE TICKET DE CAISSE
     ======================================================================= */
  const modal = document.getElementById("modal");
  const ticketLignes = document.getElementById("ticket-lignes");
  const ticketTotalVal = document.getElementById("ticket-total-val");

  // Petit jeton (forme + couleur + éventuel motif) pour le ticket
  function createJeton(article) {
    const j = document.createElement("span");
    j.className = "recu-jeton " + (article.forme === "cercle" ? "j-cercle" : "j-rect");
    j.style.background = article.couleurFond;
    if (article.motif === "hachures") {
      j.style.backgroundImage =
        "repeating-linear-gradient(-45deg, #fff 0, #fff 3px, transparent 3px, transparent 9px)";
    }
    return j;
  }

  // Construit le contenu du ticket à partir des quantités choisies
  function renderTicket() {
    ticketLignes.innerHTML = "";
    let total = 0;
    let nbLignes = 0;

    ARTICLES.forEach((article, i) => {
      const q = quantities[i];
      if (q <= 0) return;
      nbLignes++;
      const sousTotal = article.prix * q;
      total += sousTotal;

      const ligne = document.createElement("div");
      ligne.className = "recu-ligne";

      const qte = document.createElement("span");
      qte.className = "recu-qte";
      qte.textContent = q + "×";

      const nom = document.createElement("span");
      nom.className = "recu-nom";
      nom.appendChild(document.createTextNode(article.libelle || "—"));
      const pu = document.createElement("small");
      pu.textContent = formatEuros(article.prix) + " / u";
      nom.appendChild(pu);

      const prix = document.createElement("span");
      prix.className = "recu-prix";
      prix.textContent = formatEuros(sousTotal);

      ligne.append(qte, createJeton(article), nom, prix);
      ticketLignes.appendChild(ligne);
    });

    if (nbLignes === 0) {
      const vide = document.createElement("p");
      vide.className = "ticket-vide";
      vide.textContent = "Aucun article sélectionné.";
      ticketLignes.appendChild(vide);
    }
    ticketTotalVal.textContent = formatEuros(total);
  }

  function openTicket() { renderTicket(); modal.classList.add("open"); }
  function closeTicket() { modal.classList.remove("open"); }

  // Ouverture au clic (et au clavier) sur le libellé « TOTAL : » et le montant
  document.querySelectorAll(".total-label, .total-value").forEach((el) => {
    el.setAttribute("role", "button");
    el.setAttribute("tabindex", "0");
    el.setAttribute("title", "Voir le détail de la vente");
    el.addEventListener("click", openTicket);
    el.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openTicket(); }
    });
  });

  // Fermeture : bouton ✕, clic sur le fond, touche Échap
  document.getElementById("ticket-close").addEventListener("click", closeTicket);
  modal.addEventListener("click", (e) => { if (e.target === modal) closeTicket(); });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && modal.classList.contains("open")) closeTicket();
  });

  // Bouton RAZ du ticket -> remet à zéro et ferme (client suivant)
  document.getElementById("btn-suivant").addEventListener("click", () => {
    resetAll();
    closeTicket();
  });

  /* =======================================================================
     PIÈGE DE NAVIGATION "RETOUR" (aspect application)
     -----------------------------------------------------------------------
     Le geste / bouton "Précédent" ne quitte plus la page : s'il y a une
     modale ouverte, il la ferme ; sinon l'état est simplement ré-empilé.
     ======================================================================= */
  history.pushState(null, "", location.href);
  window.addEventListener("popstate", () => {
    if (modal.classList.contains("open")) closeTicket();
    history.pushState(null, "", location.href);
  });

  updateTotal();
  </script>
</body>
</html>
