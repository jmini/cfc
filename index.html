<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculette de vente</title>
  <style>
    :root {
      --border: #000;
      --green: #4e8a3f;
      --green-dark: #2f5e26;
      --gap: 4px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 12px;
      font-family: Arial, Helvetica, sans-serif;
      background: #fff;
      color: #000;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
    }

    /* ---------- Barre du haut : RAZ + TOTAL ---------- */
    .topbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: stretch;
      margin-bottom: 16px;
    }

    .btn-raz {
      font-size: 22px;
      font-weight: bold;
      color: #d00;
      background: #eee;
      border: 3px solid #7b2fb0;
      border-radius: 4px;
      padding: 6px 22px;
      cursor: pointer;
      letter-spacing: 1px;
    }
    .btn-raz:hover { background: #e0e0e0; }
    .btn-raz:active { background: #d0d0d0; }

    .total-label,
    .total-value {
      background: var(--green);
      color: #fff;
      font-weight: bold;
      display: flex;
      align-items: center;
      border-radius: 3px;
    }
    .total-label {
      font-size: 24px;
      padding: 0 16px;
      justify-content: flex-end;
    }
    .total-value {
      font-size: 30px;
      padding: 0 18px;
      justify-content: flex-end;
      min-width: 160px;
      background: var(--green-dark);
    }

    /* ---------- Sections ---------- */
    .board {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .section-header {
      background: #b8b8b8;
      border: 2px solid var(--border);
      text-align: center;
      font-weight: bold;
      font-size: 17px;
      padding: 6px 0;
      letter-spacing: 1px;
    }
    .header-boissons { grid-column: 1 / 3; }
    .header-restauration { grid-column: 3 / 4; }

    .column {
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    /* ---------- Cellule article ---------- */
    .cell {
      display: grid;
      grid-template-columns: 1fr 34px 26px;
      align-items: stretch;
      border: 2px solid var(--border);
      min-height: 48px;
      background: #fff;
    }

    .badge {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: bold;
      font-size: 12px;
      line-height: 1.1;
      padding: 4px;
      border-right: 2px solid var(--border);
    }
    /* pastille ronde pour les boissons */
    .badge.circle span {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,.5);
      padding: 2px;
    }

    .qty {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      border-right: 4px solid var(--strip, #ccc);
    }

    .spin {
      display: flex;
      flex-direction: column;
    }
    .spin button {
      flex: 1;
      border: none;
      border-left: 1px solid var(--border);
      background: #f2f2f2;
      cursor: pointer;
      font-size: 11px;
      line-height: 1;
      padding: 0;
    }
    .spin button:first-child { border-bottom: 1px solid var(--border); }
    .spin button:hover { background: #ddd; }
    .spin button:active { background: #ccc; }

    /* emplacement vide (réservé) */
    .cell.empty .badge span {
      background: #bdbdbd !important;
      border-color: #999;
    }
    .cell.empty .spin button { visibility: hidden; }
    .cell.empty .qty { color: #999; }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <button class="btn-raz" id="raz">RAZ</button>
      <div class="total-label">TOTAL :</div>
      <div class="total-value" id="total">0,00 €</div>
    </div>

    <div class="board">
      <div class="section-header header-boissons">BOISSONS</div>
      <div class="section-header header-restauration">RESTAURATION</div>

      <div class="column" id="col-1"></div>
      <div class="column" id="col-2"></div>
      <div class="column" id="col-3"></div>
    </div>
  </div>

  <script>
  /* =======================================================================
     SECTION PRIX DE VENTE
     -----------------------------------------------------------------------
     Cette section regroupe le prix de vente (en euros) de chacun des 16
     articles de la vente. C'est le seul endroit à modifier pour ajuster
     les tarifs. Les emplacements "empty: true" sont des cases réservées
     (non vendables) pour atteindre les 16 emplacements de la maquette.

       colonne      : colonne d'affichage (1 & 2 = BOISSONS, 3 = RESTAURATION)
       libelle      : texte affiché sur la pastille
       prix         : prix de vente unitaire en euros
       limite       : quantité maximale vendable pour cet article (stock max)
       couleurFond  : couleur de fond de la pastille
       couleurTexte : couleur du texte de la pastille
       forme        : "cercle" (boisson) ou "rectangle" (restauration)
       reserve      : true pour un emplacement réservé (non vendable)
     ======================================================================= */
  const ARTICLES = [
    // --- Colonne 1 (BOISSONS) ---
    { colonne: 1, libelle: "BIÈRE",            prix: 3.00, limite: 30, couleurFond: "#f5e000", couleurTexte: "#000", forme: "cercle" },
    { colonne: 1, libelle: "CIDRE",            prix: 3.50, limite: 30, couleurFond: "#f0a35a", couleurTexte: "#000", forme: "cercle" },
    { colonne: 1, libelle: "JUS de POMME",     prix: 2.50, limite: 30, couleurFond: "#f08a24", couleurTexte: "#000", forme: "cercle" },
    { colonne: 1, libelle: "SOFT",             prix: 2.00, limite: 30, couleurFond: "#ffffff", couleurTexte: "#000", forme: "cercle" },
    { colonne: 1, libelle: "CAFÉ",             prix: 1.00, limite: 30, couleurFond: "#000000", couleurTexte: "#fff", forme: "cercle" },
    { colonne: 1, libelle: "GOBELET",          prix: 1.00, limite: 50, couleurFond: "#e3e3f5", couleurTexte: "#5a2fa0", forme: "cercle" },

    // --- Colonne 2 (BOISSONS) ---
    { colonne: 2, libelle: "EAU",              prix: 1.00, limite: 30, couleurFond: "#2e6db4", couleurTexte: "#fff", forme: "cercle" },
    { colonne: 2, libelle: "Bouteille ROUGE",  prix: 9.00, limite: 20, couleurFond: "#c00000", couleurTexte: "#fff", forme: "cercle" },
    { colonne: 2, libelle: "Bouteille ROSÉ",   prix: 9.00, limite: 20, couleurFond: "#e0218a", couleurTexte: "#fff", forme: "cercle" },
    { colonne: 2, libelle: "VERRE VIN ou KIR", prix: 2.00, limite: 30, couleurFond: "#7cb342", couleurTexte: "#000", forme: "cercle" },
    { colonne: 2, libelle: "",                 prix: 0.00, limite: 0,  couleurFond: "#bdbdbd", couleurTexte: "#000", forme: "cercle", reserve: true },

    // --- Colonne 3 (RESTAURATION) ---
    { colonne: 3, libelle: "PLATEAU REPAS",    prix: 20.00, limite: 20, couleurFond: "#000000", couleurTexte: "#fff", forme: "rectangle" },
    { colonne: 3, libelle: "SANDWICH",         prix: 4.00,  limite: 30, couleurFond: "#e00000", couleurTexte: "#fff", forme: "rectangle" },
    { colonne: 3, libelle: "FRITES",           prix: 2.50,  limite: 30, couleurFond: "#f5e000", couleurTexte: "#000", forme: "rectangle" },
    { colonne: 3, libelle: "CRÊPE",            prix: 1.50,  limite: 30, couleurFond: "#f08a24", couleurTexte: "#000", forme: "rectangle" },
    { colonne: 3, libelle: "",                 prix: 0.00,  limite: 0,  couleurFond: "#bdbdbd", couleurTexte: "#000", forme: "rectangle", reserve: true },
  ];
  /* ===================== FIN SECTION PRIX DE VENTE ===================== */

  // Quantité vendue pour chaque article (même index que ARTICLES)
  const quantities = ARTICLES.map(() => 0);

  const totalEl = document.getElementById("total");

  function formatEuros(value) {
    return value.toFixed(2).replace(".", ",") + " €";
  }

  function updateTotal() {
    let total = 0;
    ARTICLES.forEach((a, i) => { total += a.prix * quantities[i]; });
    totalEl.textContent = formatEuros(total);
  }

  function buildCell(article, index) {
    const cell = document.createElement("div");
    cell.className = "cell" + (article.reserve ? " empty" : "");
    cell.style.setProperty("--strip", article.couleurFond);

    // Pastille / libellé
    const badge = document.createElement("div");
    badge.className = "badge " + (article.forme === "cercle" ? "circle" : "rect");
    const inner = document.createElement("span");
    inner.textContent = article.libelle;
    inner.style.background = article.couleurFond;
    inner.style.color = article.couleurTexte;
    // Contour sombre sur les textes blancs pour garantir la lisibilité
    if (article.couleurTexte.toLowerCase() === "#fff" || article.couleurTexte.toLowerCase() === "#ffffff") {
      inner.style.textShadow = "0 0 2px #000, 0 1px 1px rgba(0,0,0,.8)";
    }
    if (article.forme === "rectangle") {
      inner.style.display = "block";
      inner.style.width = "100%";
      inner.style.padding = "10px 4px";
      inner.style.border = "2px solid rgba(0,0,0,.4)";
    }
    badge.appendChild(inner);

    // Quantité
    const qty = document.createElement("div");
    qty.className = "qty";
    qty.textContent = "0";

    // Boutons + / -
    const spin = document.createElement("div");
    spin.className = "spin";
    const up = document.createElement("button");
    up.type = "button";
    up.textContent = "▲";
    up.setAttribute("aria-label", "Ajouter " + article.libelle);
    const down = document.createElement("button");
    down.type = "button";
    down.textContent = "▼";
    down.setAttribute("aria-label", "Retirer " + article.libelle);

    if (!article.reserve) {
      up.addEventListener("click", () => {
        // Respecte la limite de quantité définie dans la SECTION PRIX DE VENTE
        if (quantities[index] >= article.limite) return;
        quantities[index]++;
        qty.textContent = quantities[index];
        updateTotal();
      });
      down.addEventListener("click", () => {
        if (quantities[index] > 0) {
          quantities[index]--;
          qty.textContent = quantities[index];
          updateTotal();
        }
      });
    }

    spin.appendChild(up);
    spin.appendChild(down);

    cell.appendChild(badge);
    cell.appendChild(qty);
    cell.appendChild(spin);

    // Mémoriser l'élément quantité pour le RAZ
    cell._qtyEl = qty;
    return cell;
  }

  // Rendu des colonnes
  const columns = {
    1: document.getElementById("col-1"),
    2: document.getElementById("col-2"),
    3: document.getElementById("col-3"),
  };
  const cells = [];
  ARTICLES.forEach((article, index) => {
    const cell = buildCell(article, index);
    columns[article.colonne].appendChild(cell);
    cells.push(cell);
  });

  // RAZ : remise à zéro de toutes les quantités et du total
  document.getElementById("raz").addEventListener("click", () => {
    for (let i = 0; i < quantities.length; i++) {
      quantities[i] = 0;
      cells[i]._qtyEl.textContent = "0";
    }
    updateTotal();
  });

  updateTotal();
  </script>
</body>
</html>
